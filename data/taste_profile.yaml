summary: "Primarily hook-driven, danceable pop across eras and genres — Taylor Swift is the library cornerstone, K-pop is a clear passion (Aespa, Blackpink, Le SSerafim, Ateez, ILLIT, Katseye), and the Charli XCX Brat-era hyperpop lane is well represented. Strong nostalgia for late 00s / early 10s pop (Britney, Gwen, Beyoncé, Rihanna, Nelly Furtado). Loves empowerment anthems, big hooks, and artists with distinct personalities; also enjoys disco, dance-pop, and upbeat electronic."
